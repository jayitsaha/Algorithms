<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotate Array — Interactive Explainer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f8f5;        --bg2: #f0efe9;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.12);  --border2: rgba(0,0,0,0.22);
    --text: #1a1a18;      --text2: #6b6b65;   --text3: #9c9a92;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
    --sans: 'DM Sans', system-ui, sans-serif;
    --blue-bg:#E6F1FB;  --blue-border:#85B7EB;  --blue-text:#042C53;  --blue-mid:#185FA5;
    --green-bg:#EAF3DE; --green-border:#97C459; --green-text:#173404; --green-mid:#3B6D11;
    --amber-bg:#FAEEDA; --amber-border:#EF9F27; --amber-text:#412402; --amber-mid:#854F0B;
    --red-bg:#FCEBEB;   --red-border:#F09595;   --red-text:#501313;   --red-mid:#A32D2D;
    --purple-bg:#EEEDFE;--purple-border:#AFA9EC;--purple-text:#26215C;--purple-mid:#534AB7;
    --radius: 10px;      --radius-lg: 14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#18181a; --bg2:#222224; --surface:#2a2a2d;
      --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.2);
      --text:#e8e6de; --text2:#9c9a92; --text3:#666460;
      --blue-bg:#0c2a45;   --blue-border:#378ADD;  --blue-text:#B5D4F4;  --blue-mid:#85B7EB;
      --green-bg:#172a0a;  --green-border:#639922; --green-text:#C0DD97; --green-mid:#97C459;
      --amber-bg:#2e1c05;  --amber-border:#BA7517; --amber-text:#FAC775; --amber-mid:#EF9F27;
      --red-bg:#3a0a0a;    --red-border:#E24B4A;   --red-text:#F7C1C1;   --red-mid:#A32D2D;
      --purple-bg:#1e1a45; --purple-border:#7F77DD;--purple-text:#CECBF6;--purple-mid:#AFA9EC;
    }
  }

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem 2rem 1.75rem;
    width: 100%;
    max-width: 680px;
  }

  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .header .subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; line-height: 1.5; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .tag {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 3px 9px; border-radius: 20px;
  }
  .tag-medium     { background: var(--amber-bg); color: var(--amber-mid); }
  .tag-pattern    { background: var(--blue-bg);  color: var(--blue-mid); }
  .tag-complexity { background: var(--purple-bg); color: var(--purple-mid); }

  /* Array */
  .ptr-labels { display: flex; gap: 6px; justify-content: center; margin-bottom: 5px; height: 22px; }
  .ptr-label {
    width: 54px; height: 22px; display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
    border-radius: 4px; transition: opacity 0.25s;
  }
  .ptr-label.blue   { background: var(--blue-bg); color: var(--blue-mid); }
  .ptr-label.green  { background: var(--green-bg); color: var(--green-mid); }
  .ptr-label.hidden { opacity: 0; }

  .array-row { display: flex; gap: 6px; justify-content: center; }
  .cell {
    width: 54px; height: 54px; border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 600; font-family: var(--mono);
    border: 0.5px solid var(--border);
    background: var(--surface); color: var(--text);
    transition: background 0.25s, border-color 0.25s, color 0.25s, transform 0.25s;
  }
  .cell.left      { border: 2px solid var(--blue-border);  background: var(--blue-bg);  color: var(--blue-text); }
  .cell.right     { border: 2px solid var(--green-border); background: var(--green-bg); color: var(--green-text); }
  .cell.swap      { border: 2px solid var(--amber-border); background: var(--amber-bg); color: var(--amber-text); transform: scale(1.06); }
  .cell.reversed  { border: 2px solid var(--purple-border);background: var(--purple-bg);color: var(--purple-text); }
  .cell.done      { border: 2px solid var(--green-border); background: var(--green-bg); color: var(--green-text); }
  .cell.section-a { border: 2px solid var(--red-border);   background: var(--red-bg);   color: var(--red-text); }
  .cell.section-b { border: 2px solid var(--blue-border);  background: var(--blue-bg);  color: var(--blue-text); }

  .idx-labels { display: flex; gap: 6px; justify-content: center; margin-top: 4px; }
  .idx-label { width: 54px; text-align: center; font-size: 10px; color: var(--text3); font-family: var(--mono); }

  /* Section markers */
  .section-markers { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
  .section-marker {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.4px; padding: 4px 10px; border-radius: 6px;
  }
  .section-marker.a { background: var(--red-bg); color: var(--red-mid); }
  .section-marker.b { background: var(--blue-bg); color: var(--blue-mid); }

  /* Variable tracker */
  .var-tracker { display: flex; gap: 10px; justify-content: center; margin-top: 1.25rem; flex-wrap: wrap; }
  .var-box {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg2); border-radius: var(--radius);
    padding: 6px 12px; border: 1px solid transparent;
    transition: background 0.3s, border-color 0.3s;
  }
  .var-box.changed { border-color: var(--amber-border); background: var(--amber-bg); }
  .var-name { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text3); }
  .var-val { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--text); min-width: 18px; text-align: center; }

  /* Code panel */
  .code-panel {
    margin-top: 1.25rem; background: var(--bg2); border-radius: var(--radius);
    padding: 10px 14px; font-family: var(--mono); font-size: 10.5px; line-height: 1.75; overflow-x: auto;
  }
  .code-line { padding: 1px 5px; border-radius: 4px; transition: background 0.25s; white-space: pre; color: var(--text2); }
  .code-line.active { background: var(--green-bg); color: var(--green-text); font-weight: 500; }

  /* Info box */
  .info-box {
    margin-top: 1.25rem; background: var(--bg2); border-radius: var(--radius);
    padding: 1rem 1.25rem; min-height: 80px;
  }
  .phase-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .phase-badge {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 3px 9px; border-radius: 20px;
  }
  .phase-init   { background: var(--purple-bg); color: var(--purple-mid); }
  .phase-rev1   { background: var(--red-bg);    color: var(--red-mid); }
  .phase-rev2   { background: var(--blue-bg);   color: var(--blue-mid); }
  .phase-rev3   { background: var(--amber-bg);  color: var(--amber-mid); }
  .phase-done   { background: var(--green-bg);  color: var(--green-mid); }
  .step-num { font-size: 11px; color: var(--text3); }
  .info-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .info-body  { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .code-inline {
    font-family: var(--mono); font-size: 11px; padding: 1px 5px;
    border-radius: 4px; background: var(--surface);
    border: 0.5px solid var(--border2); color: var(--text);
  }

  /* Progress dots */
  .progress { display: flex; gap: 5px; justify-content: center; margin-top: 1.25rem; flex-wrap: wrap; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border2); transition: background 0.2s, transform 0.2s;
  }
  .dot.active { background: var(--green-mid); transform: scale(1.3); }

  /* Controls */
  .controls { display: flex; gap: 8px; justify-content: center; margin-top: 1.25rem; }
  .btn {
    padding: 8px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
    font-family: var(--sans); border: 0.5px solid var(--border2);
    background: var(--surface); color: var(--text);
    cursor: pointer; transition: background 0.15s, opacity 0.15s;
  }
  .btn:hover:not(:disabled) { background: var(--bg2); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.primary { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
  .btn.primary:hover:not(:disabled) { opacity: 0.85; }
  .kbd-hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 8px; }

  /* Legend */
  .legend {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin-top: 1.25rem; padding-top: 1rem;
    border-top: 0.5px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text2); }
  .legend-swatch {
    width: 12px; height: 12px; border-radius: 3px;
    border: 1.5px solid transparent;
  }
  .ls-left     { background: var(--blue-bg);   border-color: var(--blue-border); }
  .ls-right    { background: var(--green-bg);  border-color: var(--green-border); }
  .ls-swap     { background: var(--amber-bg);  border-color: var(--amber-border); }
  .ls-reversed { background: var(--purple-bg); border-color: var(--purple-border); }
  .ls-done     { background: var(--green-bg);  border-color: var(--green-border); }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>Rotate Array</h1>
    <p class="subtitle">Reversal Algorithm — reverse entire array, then reverse first k and last n-k elements separately.</p>
    <div class="tags">
      <span class="tag tag-medium">#189 Medium</span>
      <span class="tag tag-pattern">Reversal</span>
      <span class="tag tag-complexity">O(n) / O(1)</span>
    </div>
  </div>

  <div id="ptr-labels" class="ptr-labels"></div>
  <div id="array-row" class="array-row"></div>
  <div id="idx-labels" class="idx-labels"></div>
  <div id="section-markers" class="section-markers"></div>

  <div id="var-tracker" class="var-tracker"></div>

  <div class="code-panel" id="code-panel"></div>

  <div class="info-box">
    <div class="phase-row">
      <span id="phase-badge" class="phase-badge phase-init">Init</span>
      <span id="step-num" class="step-num">Step 0 of 14</span>
    </div>
    <div id="info-title" class="info-title"></div>
    <div id="info-body" class="info-body"></div>
  </div>

  <div class="progress" id="progress"></div>

  <div class="controls">
    <button class="btn" id="btn-prev" onclick="go(-1)">← Prev</button>
    <button class="btn primary" id="btn-next" onclick="go(1)">Next →</button>
    <button class="btn" onclick="reset()">↺ Reset</button>
  </div>
  <div class="kbd-hint">Use ← → arrow keys to navigate</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch ls-left"></div>left ptr</div>
    <div class="legend-item"><div class="legend-swatch ls-right"></div>right ptr</div>
    <div class="legend-item"><div class="legend-swatch ls-swap"></div>swapping</div>
    <div class="legend-item"><div class="legend-swatch ls-reversed"></div>reversed</div>
    <div class="legend-item"><div class="legend-swatch ls-done"></div>final</div>
  </div>
</div>

<script>
// Example: [1,2,3,4,5,6,7], k=3 → [5,6,7,1,2,3,4]
const K = 3;
const N = 7;

const codeLines = [
  'def rotate(nums, k):',
  '    k = k % len(nums)      # handle k > n',
  '    def reverse(l, r):',
  '        while l < r:',
  '            nums[l], nums[r] = nums[r], nums[l]',
  '            l, r = l + 1, r - 1',
  '    reverse(0, len(nums)-1) # reverse all',
  '    reverse(0, k-1)         # reverse first k',
  '    reverse(k, len(nums)-1) # reverse rest',
];

const varNames = ['k', 'left', 'right'];

const steps = [
  {
    arr: [1,2,3,4,5,6,7],
    cells: ['normal','normal','normal','normal','normal','normal','normal'],
    vars: { k: 3, left: '—', right: '—' },
    changed: ['k'],
    activeLine: 1,
    phase: 'init',
    sections: null,
    title: 'Initialize — k=3',
    body: 'Rotate right by 3 steps. Last 3 elements [5,6,7] should move to front. <span class="code-inline">k = k % n = 3 % 7 = 3</span>.'
  },
  {
    arr: [1,2,3,4,5,6,7],
    cells: ['normal','normal','normal','normal','section-a','section-a','section-a'],
    vars: { k: 3, left: '—', right: '—' },
    changed: [],
    activeLine: 1,
    phase: 'init',
    sections: {a: 'last k=3 → front', b: null},
    title: 'Goal: Move last k elements to front',
    body: 'Elements [5,6,7] need to end up at positions [0,1,2]. The reversal trick achieves this elegantly in 3 steps.'
  },
  {
    arr: [1,2,3,4,5,6,7],
    cells: ['left','normal','normal','normal','normal','normal','right'],
    vars: { k: 3, left: 0, right: 6 },
    changed: ['left', 'right'],
    activeLine: 6,
    phase: 'rev1',
    sections: null,
    title: 'Step 1: Reverse entire array',
    body: 'First, reverse the whole array. Start with <span class="code-inline">left=0, right=6</span>.'
  },
  {
    arr: [7,2,3,4,5,6,1],
    cells: ['swap','normal','normal','normal','normal','normal','swap'],
    vars: { k: 3, left: 0, right: 6 },
    changed: [],
    activeLine: 4,
    phase: 'rev1',
    sections: null,
    title: 'Swap nums[0] ↔ nums[6]',
    body: 'Swap 1 and 7. Array becomes [7,2,3,4,5,6,1].'
  },
  {
    arr: [7,6,3,4,5,2,1],
    cells: ['reversed','swap','normal','normal','normal','swap','reversed'],
    vars: { k: 3, left: 1, right: 5 },
    changed: ['left', 'right'],
    activeLine: 4,
    phase: 'rev1',
    sections: null,
    title: 'Swap nums[1] ↔ nums[5]',
    body: 'Swap 2 and 6. Array becomes [7,6,3,4,5,2,1].'
  },
  {
    arr: [7,6,5,4,3,2,1],
    cells: ['reversed','reversed','swap','normal','swap','reversed','reversed'],
    vars: { k: 3, left: 2, right: 4 },
    changed: ['left', 'right'],
    activeLine: 4,
    phase: 'rev1',
    sections: null,
    title: 'Swap nums[2] ↔ nums[4]',
    body: 'Swap 3 and 5. Array becomes [7,6,5,4,3,2,1].'
  },
  {
    arr: [7,6,5,4,3,2,1],
    cells: ['reversed','reversed','reversed','reversed','reversed','reversed','reversed'],
    vars: { k: 3, left: 3, right: 3 },
    changed: ['left', 'right'],
    activeLine: 5,
    phase: 'rev1',
    sections: null,
    title: 'First reversal complete',
    body: '<span class="code-inline">left=3, right=3</span> → pointers crossed. Entire array reversed: [7,6,5,4,3,2,1].'
  },
  {
    arr: [7,6,5,4,3,2,1],
    cells: ['left','normal','right','reversed','reversed','reversed','reversed'],
    vars: { k: 3, left: 0, right: 2 },
    changed: ['left', 'right'],
    activeLine: 7,
    phase: 'rev2',
    sections: {a: 'reverse [0..k-1]', b: null},
    title: 'Step 2: Reverse first k elements',
    body: 'Reverse elements [0..k-1] = [0..2]. This puts [5,6,7] in correct order at the front.'
  },
  {
    arr: [5,6,7,4,3,2,1],
    cells: ['swap','normal','swap','reversed','reversed','reversed','reversed'],
    vars: { k: 3, left: 0, right: 2 },
    changed: [],
    activeLine: 4,
    phase: 'rev2',
    sections: null,
    title: 'Swap nums[0] ↔ nums[2]',
    body: 'Swap 7 and 5. Array becomes [5,6,7,4,3,2,1].'
  },
  {
    arr: [5,6,7,4,3,2,1],
    cells: ['done','done','done','reversed','reversed','reversed','reversed'],
    vars: { k: 3, left: 1, right: 1 },
    changed: ['left', 'right'],
    activeLine: 5,
    phase: 'rev2',
    sections: null,
    title: 'Second reversal complete',
    body: '<span class="code-inline">left=1, right=1</span> → done. First k=3 elements are now [5,6,7] ✓'
  },
  {
    arr: [5,6,7,4,3,2,1],
    cells: ['done','done','done','left','normal','normal','right'],
    vars: { k: 3, left: 3, right: 6 },
    changed: ['left', 'right'],
    activeLine: 8,
    phase: 'rev3',
    sections: {a: null, b: 'reverse [k..n-1]'},
    title: 'Step 3: Reverse remaining elements',
    body: 'Reverse elements [k..n-1] = [3..6]. This puts [1,2,3,4] in correct order.'
  },
  {
    arr: [5,6,7,1,3,2,4],
    cells: ['done','done','done','swap','normal','normal','swap'],
    vars: { k: 3, left: 3, right: 6 },
    changed: [],
    activeLine: 4,
    phase: 'rev3',
    sections: null,
    title: 'Swap nums[3] ↔ nums[6]',
    body: 'Swap 4 and 1. Array becomes [5,6,7,1,3,2,4].'
  },
  {
    arr: [5,6,7,1,2,3,4],
    cells: ['done','done','done','done','swap','swap','done'],
    vars: { k: 3, left: 4, right: 5 },
    changed: ['left', 'right'],
    activeLine: 4,
    phase: 'rev3',
    sections: null,
    title: 'Swap nums[4] ↔ nums[5]',
    body: 'Swap 3 and 2. Array becomes [5,6,7,1,2,3,4].'
  },
  {
    arr: [5,6,7,1,2,3,4],
    cells: ['done','done','done','done','done','done','done'],
    vars: { k: 3, left: 5, right: 4 },
    changed: ['left', 'right'],
    activeLine: 8,
    phase: 'done',
    sections: null,
    title: '✓ Done — Array rotated!',
    body: '<span class="code-inline">left > right</span> → done. Result: [5,6,7,1,2,3,4]. Rotated right by 3. <b>O(n) time, O(1) space.</b>'
  }
];

let cur = 0;

function render() {
  const step = steps[cur];

  // Array
  const arrayRow = document.getElementById('array-row');
  const ptrLabels = document.getElementById('ptr-labels');
  const idxLabels = document.getElementById('idx-labels');
  arrayRow.innerHTML = ptrLabels.innerHTML = idxLabels.innerHTML = '';

  for (let i = 0; i < N; i++) {
    const cl = step.cells[i];
    const cell = document.createElement('div');
    cell.className = 'cell ' + cl;
    cell.textContent = step.arr[i];
    arrayRow.appendChild(cell);

    const pl = document.createElement('div');
    if (cl === 'left' || (cl === 'swap' && step.vars.left === i)) { 
      pl.className = 'ptr-label blue'; pl.textContent = 'L'; 
    } else if (cl === 'right' || (cl === 'swap' && step.vars.right === i)) { 
      pl.className = 'ptr-label green'; pl.textContent = 'R'; 
    } else { 
      pl.className = 'ptr-label hidden'; pl.textContent = ''; 
    }
    ptrLabels.appendChild(pl);

    const il = document.createElement('div');
    il.className = 'idx-label';
    il.textContent = i;
    idxLabels.appendChild(il);
  }

  // Section markers
  const sm = document.getElementById('section-markers');
  sm.innerHTML = '';
  if (step.sections) {
    if (step.sections.a) {
      const m = document.createElement('div');
      m.className = 'section-marker a';
      m.textContent = step.sections.a;
      sm.appendChild(m);
    }
    if (step.sections.b) {
      const m = document.createElement('div');
      m.className = 'section-marker b';
      m.textContent = step.sections.b;
      sm.appendChild(m);
    }
  }

  // Variables
  const vt = document.getElementById('var-tracker');
  vt.innerHTML = '';
  for (const name of varNames) {
    const box = document.createElement('div');
    box.className = 'var-box' + (step.changed.includes(name) ? ' changed' : '');
    box.innerHTML = '<span class="var-name">' + name + '</span><span class="var-val">' + step.vars[name] + '</span>';
    vt.appendChild(box);
  }

  // Code panel
  const cp = document.getElementById('code-panel');
  cp.innerHTML = '';
  codeLines.forEach((line, i) => {
    const cl = document.createElement('div');
    cl.className = 'code-line' + (i === step.activeLine ? ' active' : '');
    cl.textContent = line;
    cp.appendChild(cl);
  });

  // Phase badge
  const badge = document.getElementById('phase-badge');
  if      (step.phase === 'init') { badge.className = 'phase-badge phase-init'; badge.textContent = 'Init'; }
  else if (step.phase === 'rev1') { badge.className = 'phase-badge phase-rev1'; badge.textContent = 'Reverse All'; }
  else if (step.phase === 'rev2') { badge.className = 'phase-badge phase-rev2'; badge.textContent = 'Reverse [0..k-1]'; }
  else if (step.phase === 'rev3') { badge.className = 'phase-badge phase-rev3'; badge.textContent = 'Reverse [k..n-1]'; }
  else                            { badge.className = 'phase-badge phase-done'; badge.textContent = 'Done'; }

  document.getElementById('step-num').textContent = 'Step ' + cur + ' of ' + (steps.length - 1);
  document.getElementById('info-title').textContent = step.title;
  document.getElementById('info-body').innerHTML = step.body;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === steps.length - 1;

  // Progress dots
  const prog = document.getElementById('progress');
  prog.innerHTML = '';
  steps.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === cur ? ' active' : '');
    d.style.cursor = 'pointer';
    d.addEventListener('click', () => { cur = i; render(); });
    prog.appendChild(d);
  });
}

function go(dir) { cur = Math.max(0, Math.min(steps.length - 1, cur + dir)); render(); }
function reset() { cur = 0; render(); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'r' || e.key === 'R') reset();
});

render();
</script>
</body>
</html>
