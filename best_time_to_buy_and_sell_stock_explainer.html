<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Time to Buy and Sell Stock — Interactive Explainer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f8f5;        --bg2: #f0efe9;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.12);  --border2: rgba(0,0,0,0.22);
    --text: #1a1a18;      --text2: #6b6b65;   --text3: #9c9a92;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
    --sans: 'DM Sans', system-ui, sans-serif;
    --blue-bg:#E6F1FB;  --blue-border:#85B7EB;  --blue-text:#042C53;  --blue-mid:#185FA5;
    --green-bg:#EAF3DE; --green-border:#97C459; --green-text:#173404; --green-mid:#3B6D11;
    --amber-bg:#FAEEDA; --amber-border:#EF9F27; --amber-text:#412402; --amber-mid:#854F0B;
    --red-bg:#FCEBEB;   --red-border:#F09595;   --red-text:#501313;   --red-mid:#A32D2D;
    --purple-bg:#EEEDFE;--purple-border:#AFA9EC;--purple-text:#26215C;--purple-mid:#534AB7;
    --done-bg:#E6F1FB;  --done-border:#85B7EB;  --done-text:#185FA5;
    --radius: 10px;      --radius-lg: 14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#18181a; --bg2:#222224; --surface:#2a2a2d;
      --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.2);
      --text:#e8e6de; --text2:#9c9a92; --text3:#666460;
      --blue-bg:#0c2a45;   --blue-border:#378ADD;  --blue-text:#B5D4F4;  --blue-mid:#85B7EB;
      --green-bg:#172a0a;  --green-border:#639922; --green-text:#C0DD97; --green-mid:#97C459;
      --amber-bg:#2e1c05;  --amber-border:#BA7517; --amber-text:#FAC775; --amber-mid:#EF9F27;
      --red-bg:#3a0a0a;    --red-border:#E24B4A;   --red-text:#F7C1C1;   --red-mid:#A32D2D;
      --purple-bg:#1e1a45; --purple-border:#7F77DD;--purple-text:#CECBF6;--purple-mid:#AFA9EC;
      --done-bg:#0c2a45;   --done-border:#185FA5;  --done-text:#85B7EB;
    }
  }

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem 2rem 1.75rem;
    width: 100%;
    max-width: 580px;
  }

  /* Header */
  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .header .subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; line-height: 1.5; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .tag {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 3px 9px; border-radius: 20px;
  }
  .tag-easy      { background: var(--green-bg); color: var(--green-mid); }
  .tag-pattern   { background: var(--blue-bg);  color: var(--blue-mid); }
  .tag-complexity{ background: var(--purple-bg); color: var(--purple-mid); }

  /* Pointer labels */
  .ptr-labels { display: flex; gap: 6px; justify-content: center; margin-bottom: 5px; min-height: 22px; }
  .ptr-label {
    width: 72px; height: 22px; display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
    border-radius: 4px; transition: opacity 0.25s;
  }
  .ptr-label.buy   { background: var(--blue-bg);  color: var(--blue-mid); }
  .ptr-label.sell  { background: var(--green-bg); color: var(--green-mid); }
  .ptr-label.cur   { background: var(--purple-bg); color: var(--purple-mid); }
  .ptr-label.best-buy  { background: var(--amber-bg); color: var(--amber-mid); }
  .ptr-label.hidden { opacity: 0; }

  /* Array cells */
  .array-row { display: flex; gap: 6px; justify-content: center; }
  .cell {
    width: 72px; height: 56px; border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 600; font-family: var(--mono);
    border: 0.5px solid var(--border);
    background: var(--surface); color: var(--text);
    transition: background 0.25s, border-color 0.25s, color 0.25s;
  }
  .cell.min-price { border: 2px solid var(--blue-border);  background: var(--blue-bg);  color: var(--blue-text); }
  .cell.current   { border: 2px solid var(--purple-border); background: var(--purple-bg); color: var(--purple-text); }
  .cell.best-sell { border: 2px solid var(--green-border); background: var(--green-bg); color: var(--green-text); }
  .cell.best-buy  { border: 2px solid var(--amber-border); background: var(--amber-bg); color: var(--amber-text); }
  .cell.done      { background: var(--done-bg); border-color: var(--done-border); color: var(--done-text); }
  .cell.scanned   { background: var(--bg2); border-color: var(--border); color: var(--text3); }

  /* Index labels */
  .idx-labels { display: flex; gap: 6px; justify-content: center; margin-top: 4px; }
  .idx-label { width: 72px; text-align: center; font-size: 10px; color: var(--text3); font-family: var(--mono); }
  .price-label { font-size: 9px; color: var(--text3); }

  /* Variable tracker */
  .var-tracker { display: flex; gap: 12px; justify-content: center; margin-top: 1.25rem; flex-wrap: wrap; }
  .var-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg2); border-radius: var(--radius);
    padding: 8px 14px; border: 1px solid transparent;
    transition: background 0.3s, border-color 0.3s;
  }
  .var-box.changed { border-color: var(--amber-border); background: var(--amber-bg); }
  .var-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); }
  .var-val { font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--text); min-width: 20px; text-align: center; }

  /* Code panel */
  .code-panel {
    margin-top: 1.25rem; background: var(--bg2); border-radius: var(--radius);
    padding: 12px 16px; font-family: var(--mono); font-size: 11.5px; line-height: 1.8; overflow-x: auto;
  }
  .code-line { padding: 1px 6px; border-radius: 4px; transition: background 0.25s; white-space: pre; color: var(--text2); }
  .code-line.active { background: var(--green-bg); color: var(--green-text); font-weight: 500; }

  /* Info box */
  .info-box {
    margin-top: 1.25rem; background: var(--bg2); border-radius: var(--radius);
    padding: 1rem 1.25rem; min-height: 80px;
  }
  .phase-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .phase-badge {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 3px 9px; border-radius: 20px;
  }
  .phase-init   { background: var(--purple-bg); color: var(--purple-mid); }
  .phase-scan   { background: var(--green-bg);  color: var(--green-mid); }
  .phase-newmin { background: var(--blue-bg);   color: var(--blue-mid); }
  .phase-profit { background: var(--amber-bg);  color: var(--amber-mid); }
  .phase-done   { background: var(--blue-bg);   color: var(--blue-mid); }
  .step-num { font-size: 11px; color: var(--text3); }
  .info-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .info-body  { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .ci { font-family: var(--mono); font-size: 11.5px; padding: 1px 5px; border-radius: 4px; background: var(--surface); border: 0.5px solid var(--border2); color: var(--text); }

  /* Profit indicator */
  .profit-bar {
    margin-top: 1rem; display: flex; align-items: center; gap: 10px; justify-content: center;
  }
  .profit-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .profit-val { font-family: var(--mono); font-size: 24px; font-weight: 600; color: var(--green-mid); }
  .profit-val.zero { color: var(--text3); }

  /* Progress dots */
  .progress { display: flex; gap: 5px; justify-content: center; margin-top: 1.25rem; flex-wrap: wrap; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border2); transition: background 0.2s, transform 0.2s; cursor: pointer;
  }
  .dot.active { background: var(--blue-mid); transform: scale(1.3); }

  /* Controls */
  .controls { display: flex; gap: 8px; justify-content: center; margin-top: 1.25rem; }
  .btn {
    padding: 8px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
    font-family: var(--sans); border: 0.5px solid var(--border2);
    background: var(--surface); color: var(--text);
    cursor: pointer; transition: background 0.15s, opacity 0.15s;
  }
  .btn:hover:not(:disabled) { background: var(--bg2); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.primary { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue-text); }
  .btn.primary:hover:not(:disabled) { opacity: 0.85; }
  .kbd-hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 8px; }

  /* Legend */
  .legend {
    display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    margin-top: 1.25rem; padding-top: 1rem;
    border-top: 0.5px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; border: 1.5px solid transparent; }
  .ls-min    { background: var(--blue-bg);   border-color: var(--blue-border); }
  .ls-cur    { background: var(--purple-bg); border-color: var(--purple-border); }
  .ls-sell   { background: var(--green-bg);  border-color: var(--green-border); }
  .ls-buy    { background: var(--amber-bg);  border-color: var(--amber-border); }
  .ls-done   { background: var(--done-bg);   border-color: var(--done-border); }
  .ls-scan   { background: var(--bg2);       border-color: var(--border); }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>Best Time to Buy and Sell Stock</h1>
    <p class="subtitle">Greedy single pass — track minimum price seen so far, compute profit at each day.</p>
    <div class="tags">
      <span class="tag tag-easy">#121 Easy</span>
      <span class="tag tag-pattern">Greedy</span>
      <span class="tag tag-complexity">O(n) / O(1)</span>
    </div>
  </div>

  <div id="ptr-labels" class="ptr-labels"></div>
  <div id="array-row" class="array-row"></div>
  <div id="idx-labels" class="idx-labels"></div>

  <div class="profit-bar">
    <span class="profit-label">Max Profit</span>
    <span class="profit-val" id="profit-display">0</span>
  </div>

  <div id="var-tracker" class="var-tracker"></div>
  <div class="code-panel" id="code-panel"></div>

  <div class="info-box">
    <div class="phase-row">
      <span id="phase-badge" class="phase-badge phase-init">Init</span>
      <span id="step-num" class="step-num"></span>
    </div>
    <div id="info-title" class="info-title"></div>
    <div id="info-body" class="info-body"></div>
  </div>

  <div class="progress" id="progress"></div>
  <div class="controls">
    <button class="btn" id="btn-prev" onclick="go(-1)">← Prev</button>
    <button class="btn primary" id="btn-next" onclick="go(1)">Next →</button>
    <button class="btn" onclick="reset()">↺ Reset</button>
  </div>
  <div class="kbd-hint">Use ← → arrow keys to navigate</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch ls-min"></div>min price (buy)</div>
    <div class="legend-item"><div class="legend-swatch ls-cur"></div>current day</div>
    <div class="legend-item"><div class="legend-swatch ls-sell"></div>best sell day</div>
    <div class="legend-item"><div class="legend-swatch ls-buy"></div>best buy day</div>
    <div class="legend-item"><div class="legend-swatch ls-scan"></div>scanned</div>
  </div>
</div>

<script>
const prices = [7, 1, 5, 3, 6, 4];
const N = prices.length;

const codeLines = [
  'min_price = float("inf")',
  'max_profit = 0',
  'for price in prices:',
  '    min_price = min(min_price, price)',
  '    max_profit = max(max_profit, price - min_price)',
  'return max_profit',
];

const varNames = ['min_price', 'profit today', 'max_profit'];

// Trace:
// init: min=inf, maxP=0
// day 0 (7): min=7 (new min), profit=0, maxP=0
// day 1 (1): min=1 (new min!), profit=0, maxP=0
// day 2 (5): min=1, profit=4 (new best!), maxP=4  — buy@1 sell@5
// day 3 (3): min=1, profit=2, maxP=4
// day 4 (6): min=1, profit=5 (new best!), maxP=5  — buy@1 sell@6
// day 5 (4): min=1, profit=3, maxP=5

const steps = [
  {
    cells: ['normal','normal','normal','normal','normal','normal'],
    ptrs: {},
    vars: { min_price: '∞', 'profit today': '—', max_profit: 0 },
    changed: [],
    activeLine: 0,
    phase: 'init', phaseLabel: 'Init',
    title: 'Initialise min_price = ∞, max_profit = 0',
    body: 'Start with <span class="ci">min_price = ∞</span> so any price will be lower. <span class="ci">max_profit = 0</span> — worst case is no trade.',
    bestBuy: -1, bestSell: -1, minIdx: -1
  },
  {
    cells: ['current','normal','normal','normal','normal','normal'],
    ptrs: { 0: 'cur' },
    vars: { min_price: 7, 'profit today': 0, max_profit: 0 },
    changed: ['min_price', 'profit today'],
    activeLine: 3,
    phase: 'newmin', phaseLabel: 'New Min',
    title: 'Day 0 — price = 7, new min_price!',
    body: '<span class="ci">7 < ∞</span> → <span class="ci">min_price = 7</span>. Profit if we sell today: <span class="ci">7 − 7 = 0</span>. No improvement.',
    bestBuy: -1, bestSell: -1, minIdx: 0
  },
  {
    cells: ['scanned','current','normal','normal','normal','normal'],
    ptrs: { 1: 'cur' },
    vars: { min_price: 1, 'profit today': 0, max_profit: 0 },
    changed: ['min_price'],
    activeLine: 3,
    phase: 'newmin', phaseLabel: 'New Min',
    title: 'Day 1 — price = 1, new min_price!',
    body: '<span class="ci">1 < 7</span> → <span class="ci">min_price = 1</span>. This is the cheapest buying opportunity so far. Profit: <span class="ci">1 − 1 = 0</span>.',
    bestBuy: -1, bestSell: -1, minIdx: 1
  },
  {
    cells: ['scanned','min-price','current','normal','normal','normal'],
    ptrs: { 1: 'buy', 2: 'cur' },
    vars: { min_price: 1, 'profit today': 4, max_profit: 4 },
    changed: ['profit today', 'max_profit'],
    activeLine: 4,
    phase: 'profit', phaseLabel: 'New Best!',
    title: 'Day 2 — price = 5, profit = 4 ★',
    body: '<span class="ci">5 − 1 = 4</span> → new <span class="ci">max_profit = 4</span>! Buy at day 1 ($1), sell at day 2 ($5).',
    bestBuy: 1, bestSell: 2, minIdx: 1
  },
  {
    cells: ['scanned','min-price','scanned','current','normal','normal'],
    ptrs: { 1: 'buy', 3: 'cur' },
    vars: { min_price: 1, 'profit today': 2, max_profit: 4 },
    changed: ['profit today'],
    activeLine: 4,
    phase: 'scan', phaseLabel: 'Scanning',
    title: 'Day 3 — price = 3, profit = 2',
    body: '<span class="ci">3 − 1 = 2</span> → less than current best of 4. No improvement.',
    bestBuy: 1, bestSell: 2, minIdx: 1
  },
  {
    cells: ['scanned','best-buy','scanned','scanned','best-sell','normal'],
    ptrs: { 1: 'buy', 4: 'cur' },
    vars: { min_price: 1, 'profit today': 5, max_profit: 5 },
    changed: ['profit today', 'max_profit'],
    activeLine: 4,
    phase: 'profit', phaseLabel: 'New Best!',
    title: 'Day 4 — price = 6, profit = 5 ★★',
    body: '<span class="ci">6 − 1 = 5</span> → new <span class="ci">max_profit = 5</span>! Buy at day 1 ($1), sell at day 4 ($6). Best so far!',
    bestBuy: 1, bestSell: 4, minIdx: 1
  },
  {
    cells: ['scanned','best-buy','scanned','scanned','best-sell','current'],
    ptrs: { 1: 'buy', 5: 'cur' },
    vars: { min_price: 1, 'profit today': 3, max_profit: 5 },
    changed: ['profit today'],
    activeLine: 4,
    phase: 'scan', phaseLabel: 'Scanning',
    title: 'Day 5 — price = 4, profit = 3',
    body: '<span class="ci">4 − 1 = 3</span> → less than 5. No improvement. Last element.',
    bestBuy: 1, bestSell: 4, minIdx: 1
  },
  {
    cells: ['scanned','best-buy','scanned','scanned','best-sell','scanned'],
    ptrs: { 1: 'buy', 4: 'sell' },
    vars: { min_price: 1, 'profit today': '—', max_profit: 5 },
    changed: [],
    activeLine: 5,
    phase: 'done', phaseLabel: 'Done',
    title: '✓ Done — max_profit = 5',
    body: 'Buy on day 1 at $1, sell on day 4 at $6. Profit = <b>$5</b>. <b>O(n) time, O(1) space.</b>',
    bestBuy: 1, bestSell: 4, minIdx: 1
  }
];

let cur = 0;

function render() {
  const s = steps[cur];

  // Pointer labels
  const pl = document.getElementById('ptr-labels');
  pl.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const el = document.createElement('div');
    if (s.ptrs[i] === 'cur')       { el.className = 'ptr-label cur';  el.textContent = 'current'; }
    else if (s.ptrs[i] === 'buy')  { el.className = 'ptr-label buy';  el.textContent = 'buy here'; }
    else if (s.ptrs[i] === 'sell') { el.className = 'ptr-label sell'; el.textContent = 'sell here'; }
    else { el.className = 'ptr-label hidden'; }
    pl.appendChild(el);
  }

  // Array cells
  const ar = document.getElementById('array-row');
  ar.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const el = document.createElement('div');
    el.className = 'cell ' + s.cells[i];
    el.textContent = prices[i];
    ar.appendChild(el);
  }

  // Index + day labels
  const il = document.getElementById('idx-labels');
  il.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const el = document.createElement('div');
    el.className = 'idx-label';
    el.innerHTML = 'day ' + i;
    il.appendChild(el);
  }

  // Profit display
  const pd = document.getElementById('profit-display');
  pd.textContent = '$' + (s.vars.max_profit || 0);
  pd.className = 'profit-val' + (s.vars.max_profit === 0 ? ' zero' : '');

  // Variables
  const vt = document.getElementById('var-tracker');
  vt.innerHTML = '';
  for (const name of varNames) {
    const box = document.createElement('div');
    box.className = 'var-box' + (s.changed.includes(name) ? ' changed' : '');
    const val = s.vars[name];
    const display = val === '∞' ? '∞' : (typeof val === 'number' ? '$' + val : val);
    box.innerHTML = '<span class="var-name">' + name + '</span><span class="var-val">' + display + '</span>';
    vt.appendChild(box);
  }

  // Code panel
  const cp = document.getElementById('code-panel');
  cp.innerHTML = '';
  codeLines.forEach((line, i) => {
    const el = document.createElement('div');
    el.className = 'code-line' + (i === s.activeLine ? ' active' : '');
    el.textContent = line;
    cp.appendChild(el);
  });

  // Phase badge
  const badge = document.getElementById('phase-badge');
  badge.className = 'phase-badge phase-' + s.phase;
  badge.textContent = s.phaseLabel;

  document.getElementById('step-num').textContent = 'Step ' + cur + ' of ' + (steps.length - 1);
  document.getElementById('info-title').textContent = s.title;
  document.getElementById('info-body').innerHTML = s.body;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === steps.length - 1;

  // Progress dots
  const prog = document.getElementById('progress');
  prog.innerHTML = '';
  steps.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === cur ? ' active' : '');
    d.addEventListener('click', () => { cur = i; render(); });
    prog.appendChild(d);
  });
}

function go(dir) { cur = Math.max(0, Math.min(steps.length - 1, cur + dir)); render(); }
function reset() { cur = 0; render(); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'r' || e.key === 'R') reset();
});

render();
</script>
</body>
</html>
